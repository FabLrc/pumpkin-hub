name: Intégration Continue (CI)

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  frontend-ci:
    name: Validation du Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Linter / Qualité du code
        run: npm run lint

      - name: Vérification des Types
        run: npx tsc --noEmit

      - name: Test de Build
        run: npm run build

      - name: Tests unitaires et composants (avec couverture)
        run: npm run test:coverage

      - name: Upload de la couverture frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 1

  backend-ci:
    name: Validation de l'API Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pumpkin_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: pumpkin_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Formatage de code
        run: cargo fmt --all -- --check

      - name: Analyse statique (Clippy)
        run: cargo clippy -- -D warnings

      - name: Installation de sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Application des migrations
        run: sqlx migrate run --source ./migrations
        env:
          DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

      - name: Installation de cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Tests unitaires et intégration (avec couverture)
        run: cargo tarpaulin --out Lcov --output-dir ./
        env:
          DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test
          TEST_DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

      - name: Upload de la couverture backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/lcov.info
          retention-days: 1

  sonarqube:
    name: Analyse SonarQube
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Téléchargement de la couverture frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Téléchargement de la couverture backend
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: api

      - name: Analyse SonarQube
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
