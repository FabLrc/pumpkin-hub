name: Intégration Continue (CI)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend-ci:
    name: Validation du Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Linter / Qualité du code
        run: npm run lint

      - name: Vérification des Types
        run: npx tsc --noEmit

      - name: Test de Build
        run: npm run build

  backend-ci:
    name: Validation de l'API Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Formatage de code
        run: cargo fmt --all -- --check

      - name: Analyse statique (Clippy)
        run: cargo clippy -- -D warnings

      - name: Tests unitaires
        run: cargo test
