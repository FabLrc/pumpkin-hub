name: Intégration Continue (CI)

# ── Branching strategy ─────────────────────────────────────────────────────
#
# develop  = branche de travail — tout push ou PR déclenche le CI complet.
# master   = branche de production — reçoit uniquement des PR depuis develop.
#            Le push sur master (merge d'un PR) relance le CI pour déclencher
#            le workflow Docker (docker.yml → workflow_run).
#
# La protection de branche sur master interdit les push directs et exige
# que les status checks « Validation du Frontend » et « Validation de l'API
# Rust » soient au vert avant le merge.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**'
      - 'api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - develop
    paths:
      - 'frontend/**'
      - 'api/**'
      - '.github/workflows/ci.yml'

jobs:
  frontend-ci:
    name: Validation du Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Configuration de Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Linter / Qualité du code
        run: npm run lint

      - name: Vérification des Types
        run: npx tsc --noEmit

      - name: Build de production Next.js
        run: npm run build

      - name: Tests unitaires et composants (avec couverture)
        run: npm run test:coverage

      - name: Upload de la couverture frontend
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 1

  backend-ci:
    name: Validation de l'API Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pumpkin_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: pumpkin_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Formatage de code
        run: cargo fmt --all -- --check

      - name: Analyse statique (Clippy)
        run: cargo clippy -- -D warnings

      - name: Installation de sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Application des migrations
        run: sqlx migrate run --source ./migrations
        env:
          DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

      - name: Installation de cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Tests unitaires et intégration (avec couverture)
        run: cargo llvm-cov --lcov --output-path lcov.info
        env:
          DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test
          TEST_DATABASE_URL: postgres://pumpkin_user:ci_password@localhost:5432/pumpkin_hub_test

      - name: Upload de la couverture backend
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: api/lcov.info
          retention-days: 1

  sonarqube:
    name: Analyse SonarQube
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code (historique complet)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Vérification de la configuration Sonar
        id: sonar-secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ] && [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN ou SONAR_HOST_URL absent: analyse Sonar ignorée pour ce run."
          fi

      - name: Téléchargement de la couverture frontend
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Téléchargement de la couverture backend
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: api

      - name: Analyse SonarQube
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
