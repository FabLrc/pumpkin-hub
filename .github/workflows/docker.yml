name: Build & Deploy Docker Images

on:
  workflow_run:
    workflows: ["Intégration Continue (CI)"]
    branches: [master]
    types: [completed]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/fablrc/pumpkin-hub-frontend
  API_IMAGE: ghcr.io/fablrc/pumpkin-hub-api

jobs:

  # ── Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build image Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push de l'image Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.pumpkinhub.org
            NEXT_PUBLIC_S3_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_S3_PUBLIC_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Build API Rust ────────────────────────────────────────────────────────
  build-api:
    name: Build image API Rust
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push de l'image API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          dockerfile: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ── Déploiement Coolify ───────────────────────────────────────────────────
  deploy:
    name: Déclencher le redéploiement Coolify
    runs-on: ubuntu-latest
    needs: [build-frontend, build-api]
    if: success()

    steps:
      - name: Appel du webhook Coolify
        run: |
          curl --silent --fail --show-error \
            --request GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}"
