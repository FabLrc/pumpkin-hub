# DÉVELOPPEMENT LOCAL UNIQUEMENT — Ne pas utiliser en production.

services:
  frontend-dev:
    container_name: pumpkin-hub-frontend-dev
    image: pumpkin-hub-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_S3_PUBLIC_URL=http://localhost:9000
      # Used by the Next.js proxy route (server-side) to reach the API via Docker internal
      # network, bypassing the Chrome + Docker Desktop WSL2 cross-origin upload limitation.
      - NEXT_INTERNAL_API_URL=http://api-dev:8080
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

  api-dev:
    container_name: pumpkin-hub-api-dev
    image: pumpkin-hub-api:dev
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
      - cargo-cache:/usr/local/cargo/registry
    depends_on:
      db-dev:
        condition: service_healthy
      meilisearch-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://pumpkin_user:dev_password@db-dev:5432/pumpkin_hub_dev
      - MEILISEARCH_URL=http://meilisearch-dev:7700
      - MEILISEARCH_KEY=dev_master_key
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=http://localhost:8080/api/v1/auth/github/callback
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=http://localhost:8080/api/v1/auth/google/callback
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=http://localhost:8080/api/v1/auth/discord/callback
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me_in_production}
      - JWT_TTL_SECONDS=86400
      - API_PUBLIC_URL=http://localhost:8080
      - S3_ENDPOINT_URL=http://minio-dev:9000
      - S3_PUBLIC_URL=http://localhost:9000
      - S3_BUCKET=pumpkin-hub-binaries
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
      - S3_USE_DIRECT_URLS=true
      - BINARY_MAX_SIZE_BYTES=104857600
      # GitHub App (optional — set in .env to enable GitHub publishing)
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_APP_WEBHOOK_SECRET=${GITHUB_APP_WEBHOOK_SECRET:-}

  db-dev:
    container_name: pumpkin-hub-db-dev
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=pumpkin_user
      - POSTGRES_PASSWORD=dev_password
      - POSTGRES_DB=pumpkin_hub_dev
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pumpkin_user -d pumpkin_hub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch-dev:
    container_name: pumpkin-hub-meilisearch-dev
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=dev_master_key
    volumes:
      - meili-data-dev:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-dev:
    container_name: pumpkin-hub-minio-dev
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data-dev:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the default bucket on first startup
  minio-init:
    container_name: pumpkin-hub-minio-init
    image: minio/mc:latest
    depends_on:
      minio-dev:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-dev:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/pumpkin-hub-binaries;
      mc anonymous set download local/pumpkin-hub-binaries;
      exit 0;
      "

volumes:
  db-data-dev:
  meili-data-dev:
  minio-data-dev:
  cargo-cache:
